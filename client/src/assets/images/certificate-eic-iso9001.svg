<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" role="img" aria-labelledby="cert1Title cert1Desc">
  <title id="cert1Title">Certificado ISO 9001</title>
  <desc id="cert1Desc">Selo de certificado ISO 9001 com letras EIC e quadro de qualidade.</desc>
  <rect width="420" height="280" rx="28" fill="#ffffff" stroke="#181818" stroke-width="6"/>
  <circle cx="210" cy="120" r="82" fill="#f8f3e9" stroke="#181818" stroke-width="6"/>
  <text x="210" y="105" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700" fill="#181818">ISO</text>
  <text x="210" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#181818">9001</text>
  <rect x="24" y="200" width="372" height="60" rx="14" fill="#181818"/>
  <text x="210" y="238" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">EIC</text>
  <text x="210" y="262" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#ffffff">Qualidade acreditada</text>
</svg>
